name: ui-policy

on:
  push:
    branches: [main]
    paths:
      - 'depricated_ui/**'
      - 'scripts/check-ui-policy.sh'
      - '.github/workflows/ui.yml'
  pull_request:
    paths:
      - 'depricated_ui/**'
      - 'scripts/check-ui-policy.sh'
      - '.github/workflows/ui.yml'

jobs:
  unsupported-ui-policy:
    name: deprecated UI remains explicitly unsupported
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: ./scripts/check-ui-policy.sh
